<!DOCTYPE html>
<html lang="lv">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Aptauja</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1>Latvijas Pop Mūziķi</h1><p>Iepazīsti populārākos Latvijas māksliniekus</p></header>
<nav><a href="index.html">Sākums</a><a href="galerija.html">Galerija</a><a href="aptauja.html">Aptauja</a><a href="viktorina.html">Viktorīna</a></nav>

<form id="forma">
    <label>Tavs vārds</label>
    <input type="text" id="vards" placeholder="Tavs vārds" required>
    <label>Mīļākais mākslinieks?</label>
    <select id="izvele" required><option value="">-- Izvēlies --</option><option>Prāta Vētra</option><option>Dons</option><option>Musiqq</option><option>Triana Park</option><option>Aminata</option><option>Intars Busulis</option><option>Citi Zēni</option></select>
    <fieldset><legend>Cik bieži klausies Latvijas mūziku?</legend>
        <div><input type="radio" name="biezums" value="katru-dienu" required><label>Katru dienu</label></div>
        <div><input type="radio" name="biezums" value="dazreiz"><label>Dažreiz</label></div>
        <div><input type="radio" name="biezums" value="reti"><label>Reti</label></div>
    </fieldset>
    <fieldset><legend>Kā klausies mūziku?</legend>
        <div><input type="radio" name="platforma" value="spotify" required><label>Spotify</label></div>
        <div><input type="radio" name="platforma" value="youtube"><label>YouTube</label></div>
        <div><input type="radio" name="platforma" value="radio"><label>Radio</label></div>
    </fieldset>
    <fieldset><legend>Esi bijis koncertā?</legend>
        <div><input type="radio" name="koncerts" value="ja" required><label>Jā</label></div>
        <div><input type="radio" name="koncerts" value="ne"><label>Nē</label></div>
        <div><input type="radio" name="koncerts" value="plans"><label>Plānoju</label></div>
    </fieldset>
    <label>Komentārs</label><textarea id="komentars" placeholder="Tavs komentārs..."></textarea>
    <button type="submit">Iesniegt</button>
</form>
<p id="rezultats"></p>
<footer><p>© 2026 Latvijas mūzika</p></footer>

<script>
document.getElementById('forma').addEventListener('submit',function(e){
    e.preventDefault();
    let vards=document.getElementById('vards').value.trim();
    let izvele=document.getElementById('izvele').value;
    if(!vards||!izvele) return alert('Lūdzu aizpildi vārdu un izvēlies mākslinieku!');
    if(!document.querySelector('input[name="biezums"]:checked')) return alert('Izvēlies, cik bieži klausies mūziku!');
    if(!document.querySelector('input[name="platforma"]:checked')) return alert('Izvēlies platformu!');
    if(!document.querySelector('input[name="koncerts"]:checked')) return alert('Izvēlies par koncertu!');
    document.getElementById('rezultats').innerHTML='✅ Paldies, '+vards+'! Tava atbilde pieņemta!';
    document.getElementById('forma').reset();
    setTimeout(()=>document.getElementById('rezultats').innerHTML='',3000);
});
</script>
</body>
</html>
