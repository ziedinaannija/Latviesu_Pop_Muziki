<!DOCTYPE html>
<html lang="lv">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Galerija</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1>Latvijas Pop Mūziķi</h1><p>Iepazīsti populārākos Latvijas māksliniekus</p></header>
<nav><a href="index.html">Sākums</a><a href="galerija.html">Galerija</a><a href="aptauja.html">Aptauja</a><a href="viktorina.html">Viktorīna</a></nav>

<div class="gallery">
    <img src="foto/prata.jpg" alt="Prāta Vētra" onclick="openLightbox(this)">
    <img src="foto/dons.jpg" alt="Dons" onclick="openLightbox(this)">
    <img src="foto/musiq.jpg" alt="Musiqq" onclick="openLightbox(this)">
    <img src="foto/aminata.jpg" alt="Aminata" onclick="openLightbox(this)">
    <img src="foto/zeni.jpg" alt="Citi Zēni" onclick="openLightbox(this)">
    <img src="foto/busulis.jpg" alt="Intars Busulis" onclick="openLightbox(this)">
    <img src="foto/park.jpg" alt="Triana Park" onclick="openLightbox(this)">
</div>

<div id="lightbox" class="modal" onclick="closeLightbox()"><span class="close">&times;</span><div class="modal-content"><img id="lightbox-img" style="width:100%;border-radius:10px"></div></div>
<footer><p>© 2026 Latvijas mūzika</p></footer>

<script>
function openLightbox(img){let lb=document.getElementById('lightbox');lb.style.display='flex';document.getElementById('lightbox-img').src=img.src;}
function closeLightbox(){document.getElementById('lightbox').style.display='none';}
</script>
</body>
</html>
