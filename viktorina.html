<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viktorīna – Latvijas pop mūziķi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f0;
            color: #1a1a1a;
            line-height: 1.5;
        }

        header {
            background-color: #2c5a3e;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        nav {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.3rem 1rem;
            border-radius: 4px;
            transition: background 0.2s;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Viktorīnas bloki */
        .quiz-container {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .quiz-container h2 {
            color: #2c5a3e;
            margin-bottom: 1rem;
        }

        .btn {
            background-color: #2c5a3e;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1e3a2a;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin: 1rem 0 1.5rem 0;
            line-height: 1.4;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .answer-btn {
            background: #f0f0eb;
            border: 1px solid #ddd;
            padding: 0.8rem 1rem;
            text-align: left;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .answer-btn:hover {
            background: #e0e0d8;
        }

        .answer-btn.correct {
            background: #a5d6a5;
            border-color: #2e7d32;
        }

        .answer-btn.wrong {
            background: #ffcdd2;
            border-color: #c62828;
            text-decoration: line-through;
        }

        .answer-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .feedback {
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            background: #f9f9f4;
            border-left: 4px solid #2c5a3e;
        }

        .progress {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .result {
            text-align: center;
        }

        .result p {
            margin: 1rem 0;
            font-size: 1.2rem;
        }

        footer {
            background-color: #1a1a1a;
            color: #aaa;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Latvijas Pop Mūziķi</h1>
    <p>Pārbaudi savas zināšanas par Latvijas mūzikas zvaigznēm</p>
    <nav>
        <a href="index.html">Sākums</a>
        <a href="galerija.html">Galerija</a>
        <a href="aptauja.html">Aptauja</a>
        <a href="viktorina.html">Viktorīna</a>
    </nav>
</header>

<main>
    <!-- Sākuma ekrāns -->
    <div id="start-screen" class="quiz-container">
        <h2>Viktorīna par Latvijas pop mūziķiem</h2>
        <p>10 jautājumi. Katra pareiza atbilde = 1 punkts.</p>
        <p>Vai esi gatavs pārbaudīt savas zināšanas?</p>
        <button id="start-btn" class="btn">Sākt viktorīnu</button>
    </div>

    <!-- Jautājumu ekrāns -->
    <div id="quiz-screen" class="quiz-container" style="display: none;">
        <div class="progress" id="progress">1 / 10</div>
        <div class="question-text" id="question-text"></div>
        <div class="answers-list" id="answers-list"></div>
        <div class="feedback" id="feedback"></div>
        <button id="next-btn" class="btn" style="display: none;">Nākamais jautājums</button>
    </div>

    <!-- Rezultātu ekrāns -->
    <div id="result-screen" class="quiz-container result" style="display: none;">
        <h2>Viktorīna pabeigta!</h2>
        <p id="result-text"></p>
        <p id="result-comment"></p>
        <button id="restart-btn" class="btn">Sākt no jauna</button>
    </div>
</main>

<footer>
    <p>© 2026 Latvijas mūzika</p>
</footer>

<script>
    // JAUTĀJUMI (visi pareizi un atbilstoši Latvijas pop mūzikai)
    const questions = [
        {
            text: "Kura grupa ir viena no visu laiku veiksmīgākajām Latvijas pop/rock grupām, kas dibināta 1989. gadā un kļuva starptautiski pazīstama pēc Eirovīzijas 2000. gadā?",
            answers: ["Prāta Vētra", "Musiqq", "Citi Zēni", "Triana Park"],
            correct: "Prāta Vētra"
        },
        {
            text: "Kurš mākslinieks ir pazīstams ar dziesmām 'Vai mums ir pa ceļam', 'Tukšums' un pārstāvēja Latviju Eirovīzijā 2024. gadā?",
            answers: ["Intars Busulis", "Dons (Artūrs Šingirejs)", "Mārtiņš Freimanis", "Renārs Kaupers"],
            correct: "Dons (Artūrs Šingirejs)"
        },
        {
            text: "Kā sauc popmūzikas duetu, kas pazīstams ar dziesmu 'Abrakadabra' un pārstāvēja Latviju Eirovīzijā?",
            answers: ["Prāta Vētra", "Instrumenti", "Musiqq", "Tranzīts"],
            correct: "Musiqq"
        },
        {
            text: "Kura dziedātāja 2015. gadā pārstāvēja Latviju Eirovīzijā ar dziesmu 'Love Injected' un ir zināma ar dziesmu 'Maiga vara'?",
            answers: ["Samanta Tīna", "Laura Rizzotto", "Aminata Savadogo", "Justs"],
            correct: "Aminata Savadogo"
        },
        {
            text: "Kurš daudzpusīgais dziedātājs un trombonists ir pazīstams ar dziesmu 'Purva bridējs' un darbojas gan pop, gan džeza žanrā?",
            answers: ["Intars Busulis", "Aivis Madris", "Ivo Fomins", "Gustavs Butulis"],
            correct: "Intars Busulis"
        },
        {
            text: "Kura grupa ar elektroniskās popmūzikas skanējumu pārstāvēja Latviju Eirovīzijā 2017. gadā ar dziesmu 'Line'?",
            answers: ["Citi Zēni", "Sudden Lights", "Triana Park", "Carnival Youth"],
            correct: "Triana Park"
        },
        {
            text: "Kura mūsdienu pop/hip-hop grupa pārstāvēja Latviju Eirovīzijā 2022. gadā ar dziesmu 'Eat Your Salad'?",
            answers: ["Astro'n'out", "Citi Zēni", "Prāta Vētra", "Musiqq"],
            correct: "Citi Zēni"
        },
        {
            text: "Kura Latvijas dziedātāja 2002. gadā uzvarēja Eirovīzijā ar dziesmu 'I Wanna'?",
            answers: ["Laima Vaikule", "Marija Naumova", "Aija Kukule", "Olga Rajecka"],
            correct: "Marija Naumova"
        },
        {
            text: "Kurš leģendārais latviešu komponists ir sarakstījis neskaitāmas populāras dziesmas un sadarbojies ar daudziem Latvijas mūziķiem?",
            answers: ["Jānis Lūsēns", "Raimonds Pauls", "Imants Kalniņš", "Uldis Marhilēvičs"],
            correct: "Raimonds Pauls"
        },
        {
            text: "Kura grupa ir zināma ar dziesmu 'Aijā', ar kuru viņi pārstāvēja Latviju 2023. gada Eirovīzijā?",
            answers: ["Sudden Lights", "Citi Zēni", "Instrumenti", "Tautumeitas"],
            correct: "Sudden Lights"
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    // DOM elementi
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const startBtn = document.getElementById('start-btn');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');
    const progressDiv = document.getElementById('progress');
    const questionText = document.getElementById('question-text');
    const answersList = document.getElementById('answers-list');
    const feedbackDiv = document.getElementById('feedback');
    const resultText = document.getElementById('result-text');
    const resultComment = document.getElementById('result-comment');

    // SĀKT VIKTORĪNU
    function startQuiz() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        startScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        loadQuestion();
    }

    // IELĀDĒT JAUTĀJUMU
    function loadQuestion() {
        if (currentQuestion >= questions.length) {
            showResult();
            return;
        }
        
        answered = false;
        nextBtn.style.display = 'none';
        feedbackDiv.innerHTML = '';
        feedbackDiv.style.background = '#f9f9f4';
        
        const q = questions[currentQuestion];
        progressDiv.textContent = `${currentQuestion + 1} / ${questions.length}`;
        questionText.textContent = q.text;
        
        // Parādīt atbildes
        answersList.innerHTML = '';
        q.answers.forEach(answer => {
            const btn = document.createElement('button');
            btn.textContent = answer;
            btn.classList.add('answer-btn');
            btn.addEventListener('click', () => checkAnswer(answer, btn));
            answersList.appendChild(btn);
        });
    }

    // PĀRBAUDĪT ATBILDI
    function checkAnswer(selected, btnElement) {
        if (answered) return;
        answered = true;
        
        const currentQ = questions[currentQuestion];
        const isCorrect = (selected === currentQ.correct);
        
        if (isCorrect) {
            score++;
            feedbackDiv.innerHTML = '✅ Pareizi! +1 punkts.';
            feedbackDiv.style.background = '#e8f5e9';
            feedbackDiv.style.borderLeftColor = '#2e7d32';
        } else {
            feedbackDiv.innerHTML = `❌ Nepareizi. Pareizā atbilde: "${currentQ.correct}".`;
            feedbackDiv.style.background = '#ffebee';
            feedbackDiv.style.borderLeftColor = '#c62828';
        }
        
        // Atzīmēt visas atbildes
        const allBtns = document.querySelectorAll('.answer-btn');
        allBtns.forEach(btn => {
            btn.classList.add('disabled');
            if (btn.textContent === currentQ.correct) {
                btn.classList.add('correct');
            }
            if (btn.textContent === selected && btn.textContent !== currentQ.correct) {
                btn.classList.add('wrong');
            }
        });
        
        nextBtn.style.display = 'block';
    }

    // NĀKAMAIS JAUTĀJUMS
    function nextQuestion() {
        if (!answered) return;
        currentQuestion++;
        loadQuestion();
    }

    // PARĀDĪT REZULTĀTU
    function showResult() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        
        const total = questions.length;
        resultText.textContent = `Tavs rezultāts: ${score} / ${total}`;
        
        let comment = '';
        if (score === total) {
            comment = '🎉 Lieliski! Tu esi īsts Latvijas mūzikas eksperts! 🎉';
        } else if (score >= 8) {
            comment = '👍 Ļoti labi! Tev ir plašas zināšanas par Latvijas mūziku.';
        } else if (score >= 6) {
            comment = '🎶 Labi! Pamācies vēl nedaudz, un būsi eksperts.';
        } else if (score >= 4) {
            comment = '🎵 Ne slikti, bet vari uzlabot. Klausies vairāk Latvijas mūzikas!';
        } else {
            comment = '📻 Pamēģini vēlreiz! Iesaku paklausīties Latvijas populāros māksliniekus.';
        }
        resultComment.textContent = comment;
    }

    // SĀKT NO JAUNAS
    function restartQuiz() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        resultScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        loadQuestion();
    }

    // PIEVIENOT NOTIKUMU KLAUSĪTĀJUS
    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', restartQuiz);
</script>
</body>
</html>
