<!DOCTYPE html>
<html lang="lv">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Viktorīna</title><link rel="stylesheet" href="style.css"></head>
<body>
<header><h1>Latvijas Pop Mūziķi</h1><p>Pārbaudi zināšanas par Latvijas mūziku</p></header>
<nav><a href="index.html">Sākums</a><a href="galerija.html">Galerija</a><a href="aptauja.html">Aptauja</a><a href="viktorina.html">Viktorīna</a></nav>

<div id="start" class="quiz-container"><h2>Viktorīna</h2><p>10 jautājumi par Latvijas mūziku</p><button class="btn" onclick="startQuiz()">Sākt</button></div>
<div id="quiz" class="quiz-container" style="display:none"><div class="progress" id="progress"></div><div class="question-text" id="question"></div><div class="answers-list" id="answers"></div><div class="feedback" id="feedback"></div><button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Nākamais</button></div>
<div id="result" class="quiz-container result" style="display:none"><p id="score"></p><button class="btn" onclick="restart()">Sākt no jauna</button></div>
<footer><p>© 2026 Latvijas mūzika</p></footer>

<script>
const q=[{text:"Kura grupa dibināta 1989.gadā un kļuva slavena ar 'My Star'?",ans:["Prāta Vētra","Musiqq","Citi Zēni","Triana Park"],correct:"Prāta Vētra"},{text:"Kurš dziedātājs pārstāvēja Latviju 2024.gadā Eirovīzijā?",ans:["Intars Busulis","Dons","Mārtiņš Freimanis","Renārs Kaupers"],correct:"Dons"},{text:"Kā sauc duetu ar dziesmu 'Abrakadabra'?",ans:["Prāta Vētra","Instrumenti","Musiqq","Tranzīts"],correct:"Musiqq"},{text:"Kura dziedātāja 2015.gadā dziedāja 'Love Injected'?",ans:["Samanta Tīna","Laura Rizzotto","Aminata","Justs"],correct:"Aminata"},{text:"Kurš dziedātājs ir pazīstams ar 'Purva bridējs'?",ans:["Intars Busulis","Aivis Madris","Ivo Fomins","Gustavs Butulis"],correct:"Intars Busulis"},{text:"Kura grupa pārstāvēja Latviju 2017.gadā ar 'Line'?",ans:["Citi Zēni","Sudden Lights","Triana Park","Carnival Youth"],correct:"Triana Park"},{text:"Kura grupa dziedāja 'Eat Your Salad' Eirovīzijā 2022?",ans:["Astro'n'out","Citi Zēni","Prāta Vētra","Musiqq"],correct:"Citi Zēni"},{text:"Kura dziedātāja 2002.gadā uzvarēja Eirovīzijā?",ans:["Laima Vaikule","Marija Naumova","Aija Kukule","Olga Rajecka"],correct:"Marija Naumova"},{text:"Kurš leģendārais komponists ir sarakstījis daudzas latviešu dziesmas?",ans:["Jānis Lūsēns","Raimonds Pauls","Imants Kalniņš","Uldis Marhilēvičs"],correct:"Raimonds Pauls"},{text:"Kura grupa dziedāja 'Aijā' Eirovīzijā 2023?",ans:["Sudden Lights","Citi Zēni","Instrumenti","Tautumeitas"],correct:"Sudden Lights"}];
let i=0,s=0,a=false;
function startQuiz(){document.getElementById('start').style.display='none';document.getElementById('quiz').style.display='block';i=0;s=0;loadQ();}
function loadQ(){if(i>=q.length){showR();return}a=false;document.getElementById('nextBtn').style.display='none';document.getElementById('feedback').innerHTML='';let qq=q[i];document.getElementById('progress').innerText=(i+1)+'/'+q.length;document.getElementById('question').innerText=qq.text;let ansDiv=document.getElementById('answers');ansDiv.innerHTML='';qq.ans.forEach(ans=>{let btn=document.createElement('button');btn.innerText=ans;btn.className='answer-btn';btn.onclick=()=>check(ans,btn);ansDiv.appendChild(btn);});}
function check(sel,btn){if(a)return;a=true;let cur=q[i];let isC=sel===cur.correct;if(isC){s++;document.getElementById('feedback').innerHTML='✅ Pareizi! +1';}else{document.getElementById('feedback').innerHTML='❌ Nepareizi. Pareizā: '+cur.correct;}document.querySelectorAll('.answer-btn').forEach(b=>{b.classList.add('disabled');if(b.innerText===cur.correct)b.classList.add('correct');if(b.innerText===sel&&b.innerText!==cur.correct)b.classList.add('wrong');});document.getElementById('nextBtn').style.display='block';}
function nextQuestion(){if(!a)return;i++;loadQ();}
function showR(){document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';document.getElementById('score').innerHTML=`Rezultāts: ${s}/${q.length}`;}
function restart(){document.getElementById('result').style.display='none';startQuiz();}
</script>
</body>
</html>
